<script>
  var players = [];
  $("#start").click(() => {
    localStorage.removeItem("spg-playercount");
    localStorage.removeItem("spg-turn");
    for (var i = 0; i < 7; i++) localStorage.removeItem("player" + i);

    var files = [];
    for (var i = 0; i < players.length; i++) {
      var elidx = i + 1;
      players[i].name = $("#player" + elidx + "-name").val();
      if (!players[i].name || players[i].name.trim() === "")
        return alert("Player " + elidx + " is missing a name!");
      var file = document.getElementById("player" + elidx + "-img").files?.[0];
      if (file) files.push(file);
      else return alert("Player " + elidx + " is missing a pfp!");
    }

    tobase64Handler(files).then((f) => {
      for (var i = 0; i < f.length; i++) {
        players[i].pfp = f[i].selectedFile;
      }
      localStorage.setItem("spg-playercount", players.length);
      $("#setup").addClass("d-none");
      $("#player-container").removeClass("d-none");
      setup();
    });
  });

  function setup() {
    var container = document.getElementById("player-container");
    var ct = +localStorage.getItem("spg-playercount");
    container.classList.add("row-cols-" + ct);

    for (var i = 0; i < ct; i++) {
      var playerdata = players[i];

      var div = document.createElement("div");
      div.classList.add("col");
      container.appendChild(div);

      var card = document.createElement("div");
      card.classList.add("card", "text-light", "bg-dark", "text-center");
      div.appendChild(card);

      var img = document.createElement("img");
      img.src = playerdata.pfp;
      img.width = 200;
      img.height = 200;
      img.classList.add("card-img-top");
      card.appendChild(img);

      var cardbody = document.createElement("div");
      card.classList.add("card-body");
      card.appendChild(cardbody);

      var h5 = document.createElement("h5");
      h5.classList.add("card-title");
      h5.innerText = playerdata.name;
      cardbody.appendChild(h5);

      var pts = document.createElement("p");
      pts.id = "player" + (i + 1) + "-points";
      pts.classList.add("card-text");
      pts.innerText = playerdata.points;
      cardbody.appendChild(pts);
    }

    redrawBalls();
  }

  function checkWinner() {
    var total = 21;
    var ct = 0;
    var keys = ["poke", "great", "ultra"];
    for (var i = 0; i < 7; i++) {
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        if (questions[key][i] === 1) ct++;
      }
    }

    if (ct === total) {
      var max = 0;
      for (var i = 0; i < players.length; i++) {
        var player = players[i];
        if (player.points > max) max = player.points;
      }

      var winners = [];
      for (var i = 0; i < players.length; i++) {
        var player = players[i];
        if (player.points === max) winners.push(player.name);
      }

      alert(
        "Congratulations to " +
          winners.join(" & ") +
          " for winning with " +
          max +
          " points!",
      );
    }
  }

  var qPoints = 0;
  var qType;
  var qNum;

  var gTurn = 0;
  var cTurn = 0;

  $(".question").click(function () {
    var id = this.id;

    var num = +id.at(-1);
    var type = "";
    if (id.includes("poke")) {
      type = "poke";
      qPoints = 1;
    }
    if (id.includes("great")) {
      type = "great";
      qPoints = 2;
    }
    if (id.includes("ultra")) {
      type = "ultra";
      qPoints = 3;
    }

    if (questions[type][num] === 0) {
      showQuestion(type, num);
      qType = type;
      qNum = num;
      questions[type][num] = 1;
      redrawBalls();
    }
  });

  var questions = {
    poke: [0, 0, 0, 0, 0, 0, 0],
    great: [0, 0, 0, 0, 0, 0, 0],
    ultra: [0, 0, 0, 0, 0, 0, 0],
  };

  function showQuestion(type, num) {
    cTurn = gTurn;
    gTurn = (gTurn + 1) % players.length;
    setTurn(cTurn);
    var imgpath = "./game/" + type + "/" + num + ".png";
    popupImageg.src = imgpath;
    popupg.style.display = "flex";
  }

  var cPlayer = 0;
  function setTurn(counter) {
    var el = document.getElementById("guesser");
    cPlayer = counter;
    guesser.textContent = players[counter]?.name + "'s Turn!";
    counter = (counter + 1) % players.length;
    cTurn = counter;
  }

  function addPoints(pl, points) {
    players[pl].points += points;
    document.getElementById("player" + (pl + 1) + "-points").textContent =
      players[pl].points;
  }

  function redrawBalls() {
    $("#questions-container").removeClass("d-none");

    for (var i = 0; i < 7; i++) {
      var keys = ["poke", "great", "ultra"];
      for (var k = 0; k < keys.length; k++) {
        var key = keys[k];

        var el = document.getElementById(key + i);
        if (questions[key][i] === 1) {
          el.src = "./game/icon/" + key + "_bw.png";
        } else {
          el.src = "./game/icon/" + key + ".png";
        }
      }
    }
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = (error) => reject(error);
    });
  }

  async function tobase64Handler(files) {
    const filePathsPromises = [];
    files.forEach((file) => {
      filePathsPromises.push(this.toBase64(file));
    });
    const filePaths = await Promise.all(filePathsPromises);
    const mappedFiles = filePaths.map((base64File) => ({
      selectedFile: base64File,
    }));
    return mappedFiles;
  }

  $("#remove-player").click(() => {
    if (players.length == 0) {
      return;
    }

    var container = document.getElementById("players");
    container.removeChild(container.lastChild);
    players.pop();
    if (players.length == 0) $("#chickens").removeClass("d-none");
    if (players.length == 1) $("#start-row").addClass("d-none");
  });

  $("#add-player").click(() => {
    $("#chickens").addClass("d-none");
    if (players.length == 8) return;

    players.push({ name: "", points: 0, pfp: "" });
    var container = document.getElementById("players");
    if (players.length == 2) $("#start-row").removeClass("d-none");

    var div = document.createElement("div");
    div.classList.add("row", "mb-2");
    container.appendChild(div);

    var col0 = document.createElement("div");
    col0.classList.add("col", "col-1", "h2");
    col0.textContent = "P" + players.length;
    div.appendChild(col0);

    var col1 = document.createElement("div");
    col1.classList.add("col", "col-6");
    div.appendChild(col1);

    var txt = document.createElement("input");
    txt.type = "text";
    txt.classList.add("form-control", "bg-dark", "text-light", "w-100");
    txt.placeholder = "Player " + players.length + " Name";
    txt.id = "player" + players.length + "-name";
    col1.appendChild(txt);

    var col2 = document.createElement("div");
    col2.classList.add("col", "col-5");
    div.appendChild(col2);

    var img = document.createElement("input");
    col2.appendChild(img);
    img.type = "file";
    img.classList.add("form-control", "bg-dark", "text-light", "w-100");
    img.placeholder = "Player " + players.length + " PFP";
    img.id = "player" + players.length + "-img";
    img.dataset.idx = players.length - 1;
    img.accept = "image/*";
  });
</script>

        </button>

          Reveal Answer!
        </button>
      </div>
    </div>
  </div>
  <script>
    const popupg = document.getElementById("image-popup-g");
    const popupImageg = document.getElementById("popup-image-g");
    const closePopupElementg = document.querySelector(".popup-close-g");

    function closePopupg(reset = false) {
      if (popupg) {
        popupg.style.display = "none";
        popupImageg.src = "";
        if (reset) {
          questions[qType][qNum] = 0;
          redrawBalls();
        }
      }
    }

    // Add event listener to close button
    if (closePopupElementg) {
      closePopupElementg.addEventListener("click", () => {
        closePopupg(true);
      });
    }

    /*
  // Close the popup when clicking outside the image
  if (popupg) {
    popupg.addEventListener("click", (event) => {
      if (event.target === popupg) {
        closePopupg();
      }
    });
  }
  */

    $(document).keydown((e) => {
      if (e.keyCode === 27) {
        // esc
        closePopupg(true);
      }
    });

    $("#guess-wrong").click(() => {
      setTurn(cTurn);
    });

    $("#guess-correct").click(() => {
      addPoints(cPlayer, qPoints);
      closePopupg(false);
      checkWinner();
    });

    $("#guess-skip").click(() => {
      closePopupg(false);
      checkWinner();
    });

    $("#guess-reveal").click(() => {
        popupImageg.src = popupImageg.src.replace(".png", "a.png");
    });
  </script>
